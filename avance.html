<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Avance de meta | Gigantes de Azapa Salta 2026</title><script src="config.js"></script><script src="form-bridge.js"></script><style>body{margin:0;font-family:Arial,sans-serif;background:#0b0f14;color:#fff;min-height:100vh}.hero{min-height:48vh;display:flex;align-items:flex-end;padding:80px 20px 32px;position:relative;overflow:hidden}.hero-content{position:relative;z-index:1;width:min(1100px,100%);margin:0 auto}h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin:0 0 12px;line-height:.95}h1 em{color:#f36b21;font-style:normal}.lead{font-size:1rem;color:rgba(255,255,255,.82);margin-bottom:20px;line-height:1.5;max-width:600px}.main{width:min(1100px,100%);margin:0 auto;padding:28px 20px}.panel{background:rgba(255,255,255,.97);color:#111;border-radius:12px;padding:28px;margin-bottom:20px;box-shadow:0 18px 46px rgba(0,0,0,.28);text-align:center}.meta-num{font-size:clamp(3rem,10vw,6rem);font-weight:900;color:#f36b21;line-height:1}.meta-label{font-size:.9rem;color:#6b7280;margin-bottom:20px}.progress-bar{background:#f3f4f6;border-radius:999px;height:24px;overflow:hidden;margin:16px 0}.progress-fill{background:linear-gradient(90deg,#f36b21,#c2410c);height:100%;border-radius:999px;transition:width .5s ease}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}.stat{background:#fef3ec;border-radius:10px;padding:14px}.stat strong{display:block;font-size:1.4rem;font-weight:900;color:#c2410c}.stat span{font-size:.75rem;color:#6b7280;font-weight:700;text-transform:uppercase}.cta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.btn{display:flex;align-items:center;justify-content:center;border-radius:10px;padding:14px;font-weight:900;font-size:.9rem;text-decoration:none;color:#fff;background:#f36b21}.btn.sec{background:#111827}@media(max-width:600px){.stats,.cta{grid-template-columns:1fr}}</style></head><body><section class="hero"><div class="hero-content"><h1>Avance de la <em>meta</em></h1><p class="lead">Seguimos juntos. Cada aporte nos acerca a Salta 2026. Revisa el avance en tiempo real.</p></div></section><div class="main"><div class="panel"><div id="recaudado" class="meta-num">$0</div><div class="meta-label">recaudado de $50.000.000 meta</div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="stats"><div class="stat"><strong id="porcentaje">0%</strong><span>Avance</span></div><div class="stat"><strong id="faltante">$50.000.000</strong><span>Falta</span></div><div class="stat"><strong id="aportes">0</strong><span>Aportes</span></div></div><div class="cta"><a href="aportes.html" class="btn">💛 Hacer un aporte</a><a href="actividades.html" class="btn sec">🤝 Actividades</a></div></div></div><script>
async function cargarMeta(){
  if(!window.GIGANTES_APPS_SCRIPT_URL||window.GIGANTES_APPS_SCRIPT_URL.includes('PEGAR'))return;
  const cb='meta_'+Date.now(),s=document.createElement('script');
  const url=new URL(window.GIGANTES_APPS_SCRIPT_URL);
  url.searchParams.set('action','meta');url.searchParams.set('callback',cb);
  window[cb]=(d)=>{delete window[cb];s.remove();if(!d||!d.ok)return;
    const meta=50000000,rec=d.recaudado||0,pct=Math.min(100,Math.round(rec/meta*100));
    document.getElementById('recaudado').textContent='$'+rec.toLocaleString('es-CL');
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('porcentaje').textContent=pct+'%';
    document.getElementById('faltante').textContent='$'+(meta-rec).toLocaleString('es-CL');
    document.getElementById('aportes').textContent=d.aportes||0;
  };
  s.onerror=()=>{delete window[cb];s.remove();};
  s.src=url.toString();document.body.appendChild(s);
}
cargarMeta();
</script></body></html>
