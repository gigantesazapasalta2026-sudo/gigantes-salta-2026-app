<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi estado documental | Gigantes de Azapa Salta 2026</title>
  <script src="config.js"></script>
  <script src="form-bridge.js"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b0f14;color:#fff;min-height:100vh}
    .hero{min-height:48vh;display:flex;align-items:flex-end;padding:80px 20px 32px;position:relative;overflow:hidden}
    .hero-content{position:relative;z-index:1;width:min(1100px,100%);margin:0 auto}
    h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin:0 0 12px;line-height:.95}
    h1 em{color:#f36b21;font-style:normal}
    .lead{font-size:1rem;color:rgba(255,255,255,.82);margin-bottom:20px;line-height:1.5;max-width:600px}
    .main{width:min(1100px,100%);margin:0 auto;padding:28px 20px}
    .panel{background:rgba(255,255,255,.97);color:#111;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 18px 46px rgba(0,0,0,.28)}
    .panel h2{margin:0 0 16px;font-size:1.3rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:grid;gap:6px;font-weight:800;font-size:.9rem}
    input{border:1px solid #d1d5db;border-radius:8px;padding:11px;font:inherit;width:100%;box-sizing:border-box}
    .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    button{min-height:42px;border:0;border-radius:8px;padding:10px 18px;background:#f36b21;color:#fff;font:inherit;font-weight:900;cursor:pointer}
    button.sec{background:#111827}
    .message{margin-top:12px;border-radius:8px;padding:12px;background:#ecfdf5;color:#065f46;font-size:.92rem}
    .message.error{background:#fef2f2;color:#991b1b}
    .docs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    .doc-card{background:#f8fafc;border-left:5px solid #f59e0b;border-radius:8px;padding:14px}
    .doc-card.ready{border-left-color:#f36b21}
    .doc-card h3{margin:0 0 6px;font-size:.95rem}
    .pill{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:.78rem;font-weight:900;background:#fef3c7;color:#92400e}
    .pill.ready{background:#fef3ec;color:#c2410c}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .sum-card{background:#fef3ec;border-left:4px solid #f36b21;border-radius:8px;padding:12px}
    .sum-card span{font-size:.75rem;font-weight:800;text-transform:uppercase;color:#6b7280}
    .sum-card strong{display:block;font-size:1.6rem;font-weight:900;color:#c2410c;line-height:1;margin-top:4px}
    @media(max-width:640px){.form-grid,.docs-grid,.summary{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <h1>Mi estado <em>documental</em></h1>
      <p class="lead">Consulta qué documentos están recibidos y cuáles faltan. Solo necesitas tu RUT/DNI y código familiar.</p>
    </div>
  </section>
  <div class="main">
    <div class="panel">
      <h2>Consultar estado</h2>
      <form id="stateForm">
        <div class="form-grid">
          <label>RUT / DNI jugador<input name="rut" required placeholder="Ej: 12.345.678-9"></label>
          <label>Código familiar<input name="codigo_familiar" required placeholder="Clave privada familiar"></label>
        </div>
        <div class="actions">
          <button type="submit">Consultar</button>
          <button class="sec" type="reset">Limpiar</button>
        </div>
      </form>
      <div id="message" class="message" hidden></div>
    </div>
    <section id="resultPanel" hidden>
      <div class="panel">
        <div class="summary">
          <div class="sum-card"><span>Jugador</span><strong id="playerName" style="font-size:1rem;margin-top:6px">-</strong></div>
          <div class="sum-card"><span>Listos</span><strong id="readyCount">0</strong></div>
          <div class="sum-card"><span>Pendientes</span><strong id="pendingCount">0</strong></div>
        </div>
        <div class="docs-grid" id="docsGrid"></div>
      </div>
    </section>
  </div>
<script>
const DOCS=[["cedula_frente","Cédula frente","Imagen del frente del documento."],["cedula_reverso","Cédula reverso","Imagen del reverso del documento."],["certificado","Certificado de nacimiento","Para validar datos del menor."],["notarial","Autorización notarial","Permiso firmado para la gira."],["medica","Ficha médica","Antecedentes de salud y emergencia."],["club","Autorización del club","Respaldo interno del club."],["seguro","Seguro o cobertura","Comprobante de seguro médico."],["rsh","RSH","Cartola para postulación IND."]];
const form=document.getElementById("stateForm"),msg=document.getElementById("message"),resultPanel=document.getElementById("resultPanel"),docsGrid=document.getElementById("docsGrid");
function setMsg(t,err=false){msg.hidden=!t;msg.textContent=t||"";msg.classList.toggle("error",err);}
function isReady(d){return Boolean(d&&(d.url||String(d.estado||"").toUpperCase().match(/SI|RECIBIDO/)));}
function renderState(data){
  const docs=data.documentos||{};let ready=0;docsGrid.innerHTML="";
  DOCS.forEach(([key,title,help])=>{const doc=docs[key]||{},ok=isReady(doc);if(ok)ready++;
    const c=document.createElement("article");c.className="doc-card"+(ok?" ready":"");
    c.innerHTML=`<h3>${title}</h3><p style="font-size:.8rem;color:#6b7280;margin:0 0 8px">${help}</p><span class="pill${ok?" ready":""}">${ok?"✅ Recibido":"⏳ Pendiente"}</span>${doc.url?`<br><a href="${doc.url}" target="_blank" style="font-size:.8rem;color:#f36b21;margin-top:6px;display:inline-block">Abrir archivo</a>`:""}${!ok?`<br><a href="documentos_carga.html" style="font-size:.8rem;color:#6b7280;margin-top:4px;display:inline-block">Subir ahora</a>`:""}`;
    docsGrid.appendChild(c);});
  document.getElementById("playerName").textContent=data.jugador||"Jugador";
  document.getElementById("readyCount").textContent=ready;
  document.getElementById("pendingCount").textContent=DOCS.length-ready;
  resultPanel.hidden=false;setMsg("Estado encontrado.");
}
form.addEventListener("submit",async(e)=>{
  e.preventDefault();const d=new FormData(form);const rut=d.get("rut"),code=d.get("codigo_familiar");
  resultPanel.hidden=true;setMsg("Consultando...");
  if(!window.GIGANTES_APPS_SCRIPT_URL||window.GIGANTES_APPS_SCRIPT_URL.includes("PEGAR")){setMsg("Falta configurar la URL.",true);return;}
  const cb="gigEst_"+Date.now(),s=document.createElement("script");
  const url=new URL(window.GIGANTES_APPS_SCRIPT_URL);
  url.searchParams.set("action","estado");url.searchParams.set("rut",rut);url.searchParams.set("codigo_familiar",code);url.searchParams.set("callback",cb);
  window[cb]=(data)=>{delete window[cb];s.remove();if(!data||!data.ok){setMsg((data&&data.message)||"No se encontró estado.",true);return;}renderState(data);};
  s.onerror=()=>{delete window[cb];s.remove();setMsg("Error de conexión.",true);};
  s.src=url.toString();document.body.appendChild(s);
});
form.addEventListener("reset",()=>{setMsg("");resultPanel.hidden=true;docsGrid.innerHTML="";});
</script>
</body>
</html>
