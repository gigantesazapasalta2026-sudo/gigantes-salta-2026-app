<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galería del club | Gigantes de Azapa Salta 2026</title>
  <script src="config.js"></script>
  <script src="form-bridge.js"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b0f14;color:#fff;min-height:100vh}
    .hero{min-height:45vh;display:flex;align-items:flex-end;padding:80px 20px 32px;position:relative;overflow:hidden}
    .hero-content{position:relative;z-index:1;width:min(1100px,100%);margin:0 auto}
    h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin:0 0 12px;line-height:.95}
    h1 em{color:#f36b21;font-style:normal}
    .lead{font-size:1rem;color:rgba(255,255,255,.82);margin-bottom:20px;line-height:1.5}
    .main{width:min(1180px,100%);margin:0 auto;padding:28px 20px}
    .galeria{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:32px}
    .foto{overflow:hidden;border-radius:10px;aspect-ratio:4/3;background:#111827}
    .foto.wide{grid-column:span 2;aspect-ratio:2/1}
    .foto img{width:100%;height:100%;object-fit:cover;transition:transform .35s;display:block}
    .foto:hover img{transform:scale(1.06)}
    .seccion{margin-bottom:28px}
    .seccion h2{font-size:1.2rem;font-weight:900;color:#f36b21;margin-bottom:12px}
    @media(max-width:700px){.foto.wide{grid-column:span 1;aspect-ratio:4/3}}
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <h1>Galería del <em>club</em></h1>
      <p class="lead">Gigantes de Azapa Rugby Club · Arica, Chile · Más que un club, una familia.</p>
    </div>
  </section>

  <div class="main">
    <div class="seccion">
      <h2>📸 El equipo</h2>
      <div class="galeria">
        <div class="foto wide"><img src="Niños reunidos 2.jpg" alt="Niños reunidos" loading="lazy"></div>
        <div class="foto"><img src="m10m12.jpg" alt="M10 M12" loading="lazy"></div>
        <div class="foto"><img src="m14.jpg" alt="M14" loading="lazy"></div>
        <div class="foto"><img src="1 m10m12.jpg" alt="Jugadores" loading="lazy"></div>
        <div class="foto"><img src="entrenamiento.jpg" alt="Entrenamiento" loading="lazy"></div>
        <div class="foto"><img src="Entrenadores.jpg" alt="Entrenadores" loading="lazy"></div>
      </div>
    </div>

    <div class="seccion">
      <h2>🏉 Momentos del club</h2>
      <div class="galeria">
        <div class="foto"><img src="3er tiempo.jpg" alt="Tercer tiempo" loading="lazy"></div>
        <div class="foto"><img src="fogata formando club.jpg" alt="Fogata" loading="lazy"></div>
        <div class="foto"><img src="Rugby estadio.jpg" alt="Rugby estadio" loading="lazy"></div>
        <div class="foto"><img src="rugby playa.jpg" alt="Rugby playa" loading="lazy"></div>
        <div class="foto"><img src="Niños reunidos.jpg" alt="Niños reunidos" loading="lazy"></div>
        <div class="foto"><img src="entrenador 1.jpg" alt="Entrenador" loading="lazy"></div>
      </div>
    </div>
  </div>
</body>
</html>
