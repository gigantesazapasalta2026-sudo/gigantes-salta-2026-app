<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Actualizar foto | Gigantes de Azapa Salta 2026</title>
  <script src="config.js"></script>
  <script src="form-bridge.js"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b0f14;color:#fff;min-height:100vh}
    .hero{min-height:42vh;display:flex;align-items:flex-end;padding:80px 20px 32px;position:relative;overflow:hidden}
    .hero-content{position:relative;z-index:1;width:min(900px,100%);margin:0 auto}
    h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:900;margin:0 0 12px;line-height:.95}
    h1 em{color:#f36b21;font-style:normal}
    .lead{font-size:1rem;color:rgba(255,255,255,.82);line-height:1.5;max-width:620px}
    .main{width:min(900px,100%);margin:0 auto;padding:28px 20px}
    .panel{background:rgba(255,255,255,.97);color:#111;border-radius:14px;padding:24px;box-shadow:0 18px 46px rgba(0,0,0,.28)}
    .info{background:#fef3ec;border:1px solid #f36b21;border-radius:10px;padding:14px;margin-bottom:18px;line-height:1.55;color:#7c2d12;font-size:.9rem}
    .form-grid{display:grid;gap:14px}
    label{display:grid;gap:6px;font-weight:900;font-size:.9rem;color:#374151}
    input{border:1px solid #d1d5db;border-radius:9px;padding:12px;font:inherit;font-size:1rem;width:100%;box-sizing:border-box}
    input:focus{outline:2px solid #f36b21;border-color:#f36b21}
    .foto-box{background:#f8fafc;border:2px dashed #f36b21;border-radius:12px;padding:20px;text-align:center}
    .preview{width:140px;height:140px;border-radius:50%;object-fit:cover;margin:0 auto 14px;display:none;border:4px solid #f36b21;background:#111827}
    input[type=file]{display:none}
    .file-btn{display:inline-flex;align-items:center;gap:8px;background:#f36b21;color:#fff;border-radius:9px;padding:11px 20px;font-weight:900;cursor:pointer}
    button{min-height:46px;border:0;border-radius:10px;padding:13px 24px;background:#f36b21;color:#fff;font:inherit;font-size:.95rem;font-weight:900;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .result{margin-top:16px;border-radius:10px;padding:14px;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;display:none;line-height:1.55}
    .result.error{background:#fef2f2;color:#991b1b;border-color:#fecaca}
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-content">
    <h1>Actualizar <em>foto</em></h1>
    <p class="lead">Usa esta página solo si el jugador ya está inscrito y falta subir o cambiar su foto para el álbum del equipo.</p>
  </div>
</section>

<div class="main">
  <div class="panel">
    <div class="info">
      Esta página no crea una nueva inscripción. Solo busca el RUT del jugador y actualiza su foto.
    </div>

    <form id="fotoForm">
      <div class="form-grid">
        <label>
          RUT / Cédula del jugador
          <input name="rut_jugador" id="rutJugador" required placeholder="Ej: 25.420.624-5">
        </label>

        <label>
          Correo usado en la inscripción
          <input name="correo" id="correo" type="email" required placeholder="correo@ejemplo.cl">
        </label>

        <div class="foto-box">
          <img id="preview" class="preview" alt="Vista previa">
          <label class="file-btn">
            📸 Elegir foto
            <input type="file" id="fotoInput" accept="image/*" required>
          </label>
          <input type="hidden" name="foto_base64" id="fotoBase64">
        </div>

        <input type="hidden" name="action" value="actualizar_foto">
        <input type="hidden" name="tipo" value="actualizar_foto">

        <button id="btnSubmit" type="submit">Guardar foto</button>
      </div>

      <div id="result" class="result"></div>
    </form>
  </div>
</div>

<script>
const fotoInput = document.getElementById("fotoInput");
const preview = document.getElementById("preview");
const fotoBase64 = document.getElementById("fotoBase64");
const form = document.getElementById("fotoForm");
const result = document.getElementById("result");
const btn = document.getElementById("btnSubmit");

fotoInput.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement("canvas");
      const maxSize = 600;
      let w = img.width;
      let h = img.height;

      if(w > h && w > maxSize){
        h = h * (maxSize / w);
        w = maxSize;
      } else if(h > maxSize){
        w = w * (maxSize / h);
        h = maxSize;
      }

      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);

      const dataUrl = canvas.toDataURL("image/jpeg", 0.78);
      preview.src = dataUrl;
      preview.style.display = "block";
      fotoBase64.value = dataUrl;
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

function enviarPorJsonp(data){
  return new Promise((resolve) => {
    const cb = "gigFoto_" + Date.now();
    const s = document.createElement("script");
    const url = new URL(window.GIGANTES_APPS_SCRIPT_URL);

    Object.entries(data).forEach(([k,v]) => url.searchParams.set(k, v));
    url.searchParams.set("callback", cb);

    window[cb] = (respuesta) => {
      delete window[cb];
      s.remove();
      resolve(respuesta);
    };

    s.onerror = () => {
      delete window[cb];
      s.remove();
      resolve({ok:false, message:"No se pudo conectar con el sistema."});
    };

    s.src = url.toString();
    document.body.appendChild(s);
  });
}

form.addEventListener("submit", async function(e){
  e.preventDefault();

  if(!fotoBase64.value){
    mostrar("Debes elegir una foto antes de guardar.", true);
    return;
  }

  btn.disabled = true;
  btn.textContent = "Guardando...";
  mostrar("Enviando foto...");

  const data = {
    action: "actualizar_foto",
    tipo: "actualizar_foto",
    rut_jugador: document.getElementById("rutJugador").value.trim(),
    correo: document.getElementById("correo").value.trim(),
    foto_base64: fotoBase64.value
  };

  const respuesta = await enviarPorJsonp(data);

  if(respuesta && respuesta.ok){
    mostrar("✅ Foto actualizada correctamente. No se creó una nueva inscripción.");
    form.reset();
    preview.style.display = "none";
    fotoBase64.value = "";
  } else {
    mostrar((respuesta && respuesta.message) || "No se pudo actualizar la foto. Revisa el RUT y correo.", true);
  }

  btn.disabled = false;
  btn.textContent = "Guardar foto";
});

function mostrar(texto, error=false){
  result.style.display = "block";
  result.textContent = texto;
  result.classList.toggle("error", error);
}
</script>

</body>
</html>
